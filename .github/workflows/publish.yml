name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    name: Build + publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Publish
        run: npm publish --access public --provenance
        working-directory: dist/cookie-consent
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
