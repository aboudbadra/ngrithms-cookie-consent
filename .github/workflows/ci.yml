name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    name: Build library + demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Build demo
        run: npm run build:demo
